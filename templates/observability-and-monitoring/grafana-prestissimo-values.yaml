  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: grafana-dashboard-import
      annotations:
        "helm.sh/hook": post-install,post-upgrade
        "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: import-dashboard
              image: curlimages/curl:8.7.1
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "Waiting for Grafana..."
                  until curl -s http://grafana/api/health >/dev/null; do
                    sleep 5
                  done

                  echo "Importing dashboard..."
                  STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
                    -u "${GRAFANA_USER}:${GRAFANA_PASSWORD}" \
                    -H "Content-Type: application/json" \
                    -X POST \
                    http://grafana/api/dashboards/db \
                    --data @/dashboards/dashboard.json)

                  echo "HTTP status: ${STATUS}"
                  cat /tmp/resp.json || true

                  if [ "$STATUS" = "200" ] || [ "$STATUS" = "412" ] || [ "$STATUS" = "401" ]; then
                    echo "Dashboard imported or already exists."
                    exit 0
                  fi

                  echo "Dashboard import failed."
                  exit 1
              env:
                - name: GRAFANA_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana
                      key: admin-user
                - name: GRAFANA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana
                      key: admin-password
              volumeMounts:
                - name: dashboard
                  mountPath: /dashboards
          volumes:
            - name: dashboard
              configMap:
                name: grafana-seed-dashboard